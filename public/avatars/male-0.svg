<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#151520"/>
    </linearGradient>
    <linearGradient id="robe-out" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0e2240"/>
    </linearGradient>
    <linearGradient id="robe-in" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ece0"/>
      <stop offset="100%" stop-color="#d4c8a8"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="60%" stop-color="#ecd0a8"/>
      <stop offset="100%" stop-color="#e0c89c"/>
    </linearGradient>
    <linearGradient id="sash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a84c"/>
      <stop offset="50%" stop-color="#e8d070"/>
      <stop offset="100%" stop-color="#c8a84c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 披肩长发 -->
  <ellipse cx="100" cy="60" rx="44" ry="46" fill="url(#hair)"/>
  <path d="M56,58 Q48,85 54,140 Q56,143 60,138 Q58,88 60,62Z" fill="url(#hair)"/>
  <path d="M144,58 Q152,85 146,140 Q144,143 140,138 Q142,88 140,62Z" fill="url(#hair)"/>
  <!-- 深蓝道袍 -->
  <path d="M62,96 Q55,104 40,195 L160,195 Q145,104 138,96 Q125,92 100,91 Q75,92 62,96Z" fill="url(#robe-out)"/>
  <path d="M55,105 Q42,120 35,145 Q38,142 48,125 Q52,115 58,108Z" fill="#143050" opacity="0.6"/>
  <path d="M145,105 Q158,120 165,145 Q162,142 152,125 Q148,115 142,108Z" fill="#143050" opacity="0.6"/>
  <!-- 内衬 -->
  <path d="M82,93 L76,195 L124,195 L118,93 L100,113Z" fill="url(#robe-in)"/>
  <path d="M82,93 L100,113 L118,93" stroke="#8B7355" stroke-width="1.2" fill="none"/>
  <!-- 腰带 -->
  <path d="M62,120 Q80,124 100,124 Q120,124 138,120 L136,127 Q118,131 100,131 Q82,131 64,127Z" fill="url(#sash)"/>
  <ellipse cx="100" cy="127" rx="5" ry="3" fill="#e8d070"/>
  <line x1="100" y1="131" x2="100" y2="143" stroke="#b8a070" stroke-width="0.8"/>
  <circle cx="100" cy="146" r="5" fill="#a0c8b8" stroke="#5a8a78" stroke-width="0.8" filter="url(#glow)"/>
  <!-- 脸部 -->
  <ellipse cx="100" cy="66" rx="28" ry="30" fill="url(#skin)"/>
  <path d="M72,72 Q80,95 100,98 Q120,95 128,72" fill="url(#skin)"/>
  <ellipse cx="72" cy="66" rx="4" ry="7" fill="#ecc8a0"/>
  <ellipse cx="128" cy="66" rx="4" ry="7" fill="#ecc8a0"/>
  <!-- 发髻 -->
  <path d="M72,50 Q82,42 100,44 Q118,42 128,50 Q122,36 100,32 Q78,36 72,50Z" fill="url(#hair)"/>
  <ellipse cx="100" cy="22" rx="12" ry="10" fill="url(#hair)"/>
  <line x1="82" y1="20" x2="118" y2="20" stroke="#c8a84c" stroke-width="2" stroke-linecap="round"/>
  <circle cx="82" cy="20" r="3" fill="#e8d070" stroke="#c8a84c" stroke-width="0.5"/>
  <!-- 眉毛 -->
  <path d="M80,55 Q86,51 96,54" stroke="#2a2020" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M104,54 Q114,51 120,55" stroke="#2a2020" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 眼睛 -->
  <ellipse cx="88" cy="62" rx="7" ry="5" fill="#fff"/>
  <ellipse cx="89" cy="62" rx="4.5" ry="4" fill="#2a1a10"/>
  <circle cx="88" cy="61" r="2" fill="#1a1a1a"/>
  <circle cx="86" cy="60" r="1.2" fill="#fff"/>
  <ellipse cx="112" cy="62" rx="7" ry="5" fill="#fff"/>
  <ellipse cx="111" cy="62" rx="4.5" ry="4" fill="#2a1a10"/>
  <circle cx="112" cy="61" r="2" fill="#1a1a1a"/>
  <circle cx="110" cy="60" r="1.2" fill="#fff"/>
  <!-- 鼻嘴 -->
  <path d="M100,68 L98,76 L102,76Z" fill="#dcc098" stroke="#c8a878" stroke-width="0.4"/>
  <path d="M93,82 Q100,85 107,82" stroke="#b07060" stroke-width="1.2" fill="none"/>
</svg>
