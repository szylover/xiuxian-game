  <path d="M72,50 Q82,42 100,44 Q118,42 128,50 Q122,36 100,33 Q78,36 72,50Z" fill="url(#f3hair)"/>
  <ellipse cx="84" cy="22" rx="10" ry="10" fill="url(#f3hair)"/>
  <ellipse cx="116" cy="22" rx="10" ry="10" fill="url(#f3hair)"/>
  <!-- 发饰 (绿宝石) -->
  <circle cx="84" cy="13" r="4" fill="#30c060" filter="url(#f3glow)"/>
  <circle cx="84" cy="13" r="2" fill="#80f0a0" opacity="0.8"/>
  <circle cx="116" cy="13" r="4" fill="#30c060" filter="url(#f3glow)"/>
  <circle cx="116" cy="13" r="2" fill="#80f0a0" opacity="0.8"/>
  <!-- 眉毛 -->
  <path d="M82,53 Q88,50 95,52" stroke="#1a1828" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M105,52 Q112,50 118,53" stroke="#1a1828" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 眼睛 (灵动) -->
  <ellipse cx="88" cy="61" rx="7.5" ry="6" fill="#fff"/>
  <ellipse cx="88" cy="62" rx="5" ry="5" fill="#182838"/>
  <circle cx="87" cy="61" r="2.5" fill="#0a1820"/>
  <circle cx="85.5" cy="59.5" r="1.5" fill="#fff"/>
  <path d="M80,57 Q84,54 96,56" stroke="#0a1820" stroke-width="1.5" fill="none"/>
  <ellipse cx="112" cy="61" rx="7.5" ry="6" fill="#fff"/>
  <ellipse cx="112" cy="62" rx="5" ry="5" fill="#182838"/>
  <circle cx="113" cy="61" r="2.5" fill="#0a1820"/>
  <circle cx="114.5" cy="59.5" r="1.5" fill="#fff"/>
  <path d="M104,57 Q108,54 120,56" stroke="#0a1820" stroke-width="1.5" fill="none"/>
  <!-- 腮红 -->
  <ellipse cx="80" cy="70" rx="8" ry="5" fill="#f0a090" opacity="0.2"/>
  <ellipse cx="120" cy="70" rx="8" ry="5" fill="#f0a090" opacity="0.2"/>
  <!-- 鼻嘴 -->
  <path d="M100,67 L99,73 L101,73Z" fill="#e8c0a0" opacity="0.7"/>
  <path d="M94,80 Q100,84 106,80" stroke="#b07070" stroke-width="1.3" fill="none"/>
</svg>
