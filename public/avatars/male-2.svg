<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="hair3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="robe3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3020"/>
      <stop offset="100%" stop-color="#0a1810"/>
    </linearGradient>
    <linearGradient id="inner3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0e0"/>
      <stop offset="100%" stop-color="#c8d8b8"/>
    </linearGradient>
    <linearGradient id="skin3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="100%" stop-color="#e0c89c"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 长披发 -->
  <ellipse cx="100" cy="60" rx="44" ry="46" fill="url(#hair3)"/>
  <path d="M56,60 Q44,90 46,155 Q50,160 56,152 Q52,96 58,64Z" fill="url(#hair3)"/>
  <path d="M144,60 Q156,90 154,155 Q150,160 144,152 Q148,96 142,64Z" fill="url(#hair3)"/>
  <!-- 墨绿战袍 -->
  <path d="M62,96 Q52,108 36,195 L164,195 Q148,108 138,96 Q124,90 100,89 Q76,90 62,96Z" fill="url(#robe3)"/>
