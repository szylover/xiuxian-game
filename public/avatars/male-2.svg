  <path d="M142,98 Q150,108 154,120 Q148,116 142,106Z" fill="#2a4830" opacity="0.8"/>
  <!-- 内衬 -->
  <path d="M82,93 L76,195 L124,195 L118,93 L100,110Z" fill="url(#inner3)"/>
  <path d="M82,93 L100,110 L118,93" stroke="#708860" stroke-width="1.2" fill="none"/>
  <!-- 腰带 (铜色) -->
  <path d="M64,120 Q80,124 100,124 Q120,124 136,120 L134,127 Q118,131 100,131 Q82,131 66,127Z" fill="#a07840"/>
  <ellipse cx="100" cy="127" rx="6" ry="3.5" fill="#c09050"/>
  <line x1="100" y1="131" x2="100" y2="142" stroke="#907038" stroke-width="0.9"/>
  <circle cx="100" cy="145" r="6" fill="#3a8040" stroke="#206030" stroke-width="0.8" filter="url(#glow3)"/>
  <!-- 脸部 -->
  <ellipse cx="100" cy="66" rx="28" ry="30" fill="url(#skin3)"/>
  <path d="M72,72 Q80,95 100,98 Q120,95 128,72" fill="url(#skin3)"/>
  <ellipse cx="72" cy="66" rx="4" ry="7" fill="#ecc8a0"/>
  <ellipse cx="128" cy="66" rx="4" ry="7" fill="#ecc8a0"/>
  <!-- 发型 -->
  <path d="M72,50 Q82,42 100,44 Q118,42 128,50 Q122,36 100,32 Q78,36 72,50Z" fill="url(#hair3)"/>
  <rect x="88" y="14" width="24" height="14" rx="3" fill="url(#hair3)"/>
  <line x1="80" y1="18" x2="120" y2="18" stroke="#505050" stroke-width="1.5"/>
  <circle cx="80" cy="18" r="3" fill="#707070"/>
  <circle cx="120" cy="18" r="2.5" fill="#606060"/>
  <!-- 眉毛 -->
  <path d="M79,54 Q86,50 95,53" stroke="#1a1010" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M105,53 Q114,50 121,54" stroke="#1a1010" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 眼睛 (有神) -->
  <ellipse cx="88" cy="62" rx="7" ry="5.5" fill="#fff"/>
  <ellipse cx="88" cy="62" rx="5" ry="4.5" fill="#1a3010"/>
  <circle cx="87" cy="61" r="2.2" fill="#0a1808"/>
  <circle cx="85.5" cy="60" r="1.2" fill="#fff"/>
  <path d="M81,57 Q85,55 95,57" stroke="#0a1808" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <ellipse cx="112" cy="62" rx="7" ry="5.5" fill="#fff"/>
  <ellipse cx="112" cy="62" rx="5" ry="4.5" fill="#1a3010"/>
  <circle cx="113" cy="61" r="2.2" fill="#0a1808"/>
  <circle cx="114.5" cy="60" r="1.2" fill="#fff"/>
  <path d="M105,57 Q109,55 119,57" stroke="#0a1808" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 鼻嘴 -->
  <path d="M100,68 L98,76 L102,76Z" fill="#dcc098"/>
  <path d="M94,82 Q100,86 106,82" stroke="#a06050" stroke-width="1.2" fill="none"/>
</svg>
