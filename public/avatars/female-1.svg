<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="f2hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a3010"/>
      <stop offset="100%" stop-color="#3a1808"/>
    </linearGradient>
    <linearGradient id="f2robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4050"/>
      <stop offset="100%" stop-color="#0a2030"/>
    </linearGradient>
    <linearGradient id="f2inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f8ff"/>
      <stop offset="100%" stop-color="#c8e8f8"/>
    </linearGradient>
    <linearGradient id="f2skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8d0"/>
      <stop offset="100%" stop-color="#e8c8a8"/>
    </linearGradient>
    <filter id="f2glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 褐色长发 -->
  <ellipse cx="100" cy="58" rx="42" ry="44" fill="url(#f2hair)"/>
